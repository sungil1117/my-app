<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PCアプリインストール申請システム</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Hiragino Sans", "Meiryo", sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
    }

    /* ── ヘッダー ── */
    header {
      background: #1a56db;
      color: #fff;
      padding: 18px 32px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: 0.03em; }
    .user-info { display: flex; align-items: center; gap: 16px; font-size: 0.9rem; }
    .btn-logout {
      padding: 6px 16px;
      background: rgba(255,255,255,0.2);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.3); }

    main { max-width: 900px; margin: 32px auto; padding: 0 16px; display: flex; flex-direction: column; gap: 28px; }

    /* ── カード ── */
    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      padding: 28px 32px;
    }
    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: #1a56db;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #e8edf5;
    }

    /* ── ログイン画面 ── */
    #loginPage {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f2f5;
    }
    .login-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-logo h2 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #1a56db;
      margin-top: 8px;
    }
    .login-logo p { font-size: 0.85rem; color: #888; margin-top: 4px; }

    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    label { font-size: 0.85rem; font-weight: 600; color: #555; }

    input[type="email"], input[type="password"], input[type="text"], textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fafafa;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #1a56db;
      box-shadow: 0 0 0 3px rgba(26,86,219,0.12);
      background: #fff;
    }
    textarea { resize: vertical; min-height: 80px; }

    .btn-primary {
      width: 100%;
      padding: 12px;
      background: #1a56db;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      letter-spacing: 0.04em;
      margin-top: 4px;
    }
    .btn-primary:hover { background: #1547b8; }
    .btn-primary:disabled { background: #93aee0; cursor: not-allowed; }

    .login-error {
      background: #fee2e2;
      color: #991b1b;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }

    /* ── フォーム ── */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group.full { grid-column: 1 / -1; }
    label span { color: #e02424; margin-left: 3px; }

    /* ── フィルタータブ ── */
    .tab-bar { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
    .tab {
      padding: 6px 18px;
      border-radius: 20px;
      border: 1.5px solid #d1d5db;
      background: #fff;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      color: #666;
      transition: all 0.2s;
    }
    .tab.active, .tab:hover { background: #1a56db; color: #fff; border-color: #1a56db; }

    .count-badge {
      display: inline-block;
      background: #e8edf5;
      color: #1a56db;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 1px 8px;
      border-radius: 10px;
      margin-left: 8px;
    }

    /* ── テーブル ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    thead tr { background: #f0f4fb; }
    th { padding: 10px 14px; text-align: left; font-size: 0.8rem; font-weight: 700; color: #555; white-space: nowrap; }
    td { padding: 12px 14px; border-top: 1px solid #f0f0f0; vertical-align: middle; }
    tbody tr { transition: background 0.15s; }
    tbody tr:hover { background: #f8f9fc; }
    .reason-cell { max-width: 220px; color: #555; font-size: 0.85rem; }

    .badge { display: inline-block; padding: 3px 12px; border-radius: 12px; font-size: 0.78rem; font-weight: 700; white-space: nowrap; }
    .badge-pending  { background: #fef3c7; color: #92400e; }
    .badge-approved { background: #d1fae5; color: #065f46; }
    .badge-rejected { background: #fee2e2; color: #991b1b; }

    .action-btns { display: flex; gap: 6px; }
    .btn-approve, .btn-reject {
      padding: 5px 14px;
      border: none;
      border-radius: 5px;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-approve { background: #10b981; color: #fff; }
    .btn-approve:hover { opacity: 0.85; }
    .btn-reject  { background: #ef4444; color: #fff; }
    .btn-reject:hover  { opacity: 0.85; }

    .empty-state { text-align: center; padding: 40px 0; color: #aaa; font-size: 0.9rem; }

    /* ── トースト ── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a56db;
      color: #fff;
      padding: 11px 26px;
      border-radius: 24px;
      font-size: 0.9rem;
      font-weight: 600;
      box-shadow: 0 4px 14px rgba(0,0,0,0.2);
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 9999;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── ローディング ── */
    .loading { text-align: center; padding: 40px 0; color: #aaa; }
    .spinner {
      display: inline-block;
      width: 28px; height: 28px;
      border: 3px solid #e0e7ff;
      border-top-color: #1a56db;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .card { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<!-- ログイン画面 -->
<div id="loginPage">
  <div class="login-card">
    <div class="login-logo">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <rect width="48" height="48" rx="12" fill="#1a56db"/>
        <path d="M14 24h20M24 14v20" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      </svg>
      <h2>PCアプリインストール申請システム</h2>
      <p>メールアドレスとパスワードでログイン</p>
    </div>
    <div class="login-error" id="loginError"></div>
    <form id="loginForm">
      <div class="form-group">
        <label for="email">メールアドレス</label>
        <input type="email" id="email" placeholder="example@company.com" required>
      </div>
      <div class="form-group">
        <label for="password">パスワード</label>
        <input type="password" id="password" placeholder="パスワードを入力" required>
      </div>
      <button type="submit" class="btn-primary" id="loginBtn">ログイン</button>
    </form>
  </div>
</div>

<!-- メイン画面 -->
<div id="mainPage" style="display:none;">
  <header>
    <h1>PCアプリインストール申請システム</h1>
    <div class="user-info">
      <span id="userEmail"></span>
      <button class="btn-logout" onclick="logout()">ログアウト</button>
    </div>
  </header>

  <main>
    <!-- 申請フォーム -->
    <div class="card">
      <div class="card-title">新規申請</div>
      <form id="applyForm" novalidate>
        <div class="form-grid">
          <div class="form-group">
            <label for="applicant">申請者名<span>*</span></label>
            <input type="text" id="applicant" placeholder="例：山田 太郎" maxlength="50">
          </div>
          <div class="form-group">
            <label for="appName">アプリ名<span>*</span></label>
            <input type="text" id="appName" placeholder="例：Visual Studio Code" maxlength="100">
          </div>
          <div class="form-group full">
            <label for="reason">申請理由<span>*</span></label>
            <textarea id="reason" placeholder="インストールが必要な理由を入力してください" maxlength="500"></textarea>
          </div>
        </div>
        <button type="submit" class="btn-primary" id="submitBtn">申請する</button>
      </form>
    </div>

    <!-- 申請一覧 -->
    <div class="card">
      <div class="card-title">
        申請一覧
        <span class="count-badge" id="totalCount">0件</span>
      </div>

      <div class="tab-bar">
        <button class="tab active" data-filter="all">すべて</button>
        <button class="tab" data-filter="pending">審査中</button>
        <button class="tab" data-filter="approved">承認済み</button>
        <button class="tab" data-filter="rejected">却下済み</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>申請日時</th>
              <th>申請者名</th>
              <th>アプリ名</th>
              <th>理由</th>
              <th>ステータス</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        <div id="loadingState" class="loading">
          <div class="spinner"></div>
          <div>読み込み中...</div>
        </div>
        <div class="empty-state" id="emptyState" style="display:none;">申請がありません</div>
      </div>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
  // ── Supabase初期化 ──
  const { createClient } = supabase;
  const sb = createClient(
    'https://vrxblwxvixqsiwgxllwx.supabase.co',
    'sb_publishable_3YRafx7BMvHGOmhuMW3Oug_jgSJWyKF'
  );

  let allApplications = [];
  let currentFilter = 'all';

  // ── 起動時：ログイン状態確認 ──
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) showMain(session.user);
    else showLogin();
  });

  sb.auth.onAuthStateChange((event, session) => {
    if (session) showMain(session.user);
    else showLogin();
  });

  // ── ログイン ──
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('loginBtn');
    const errEl    = document.getElementById('loginError');

    btn.disabled = true;
    btn.textContent = 'ログイン中...';
    errEl.style.display = 'none';

    const { error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      errEl.textContent = 'メールアドレスまたはパスワードが正しくありません';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'ログイン';
    }
  });

  // ── ログアウト ──
  async function logout() {
    await sb.auth.signOut();
  }

  // ── 画面切替 ──
  function showLogin() {
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('mainPage').style.display = 'none';
  }

  function showMain(user) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('mainPage').style.display = 'block';
    document.getElementById('userEmail').textContent = user.email;
    loadApplications();
  }

  // ── 申請フォーム送信 ──
  document.getElementById('applyForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const applicant = document.getElementById('applicant').value.trim();
    const app_name  = document.getElementById('appName').value.trim();
    const reason    = document.getElementById('reason').value.trim();

    if (!applicant || !app_name || !reason) {
      showToast('すべての項目を入力してください', '#e02424');
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '送信中...';

    const { error } = await sb.from('applications').insert([
      { applicant, app_name, reason, status: 'pending' }
    ]);

    btn.disabled = false;
    btn.textContent = '申請する';

    if (error) {
      showToast('送信に失敗しました', '#e02424');
      return;
    }

    document.getElementById('applyForm').reset();
    showToast('申請を送信しました');
    loadApplications();
  });

  // ── データ読み込み ──
  async function loadApplications() {
    document.getElementById('loadingState').style.display = 'block';
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('tableBody').innerHTML = '';

    const { data, error } = await sb
      .from('applications')
      .select('*')
      .order('created_at', { ascending: false });

    document.getElementById('loadingState').style.display = 'none';

    if (error) { showToast('データの読み込みに失敗しました', '#e02424'); return; }

    allApplications = data || [];
    renderTable();
  }

  // ── フィルタータブ ──
  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      this.classList.add('active');
      currentFilter = this.dataset.filter;
      renderTable();
    });
  });

  // ── テーブル描画 ──
  function renderTable() {
    const filtered = allApplications.filter(a =>
      currentFilter === 'all' || a.status === currentFilter
    );

    document.getElementById('totalCount').textContent = allApplications.length + '件';

    if (filtered.length === 0) {
      document.getElementById('tableBody').innerHTML = '';
      document.getElementById('emptyState').style.display = 'block';
      return;
    }
    document.getElementById('emptyState').style.display = 'none';

    document.getElementById('tableBody').innerHTML = filtered.map((a, i) => `
      <tr>
        <td style="color:#aaa;font-size:0.8rem">${filtered.length - i}</td>
        <td style="white-space:nowrap;font-size:0.83rem;color:#666">${formatDate(a.created_at)}</td>
        <td><strong>${escHtml(a.applicant)}</strong></td>
        <td>${escHtml(a.app_name)}</td>
        <td class="reason-cell" title="${escHtml(a.reason)}">${truncate(escHtml(a.reason), 40)}</td>
        <td>${badgeHtml(a.status)}</td>
        <td>${actionHtml(a)}</td>
      </tr>
    `).join('');
  }

  // ── 承認 / 却下 ──
  async function updateStatus(id, status) {
    const { error } = await sb
      .from('applications')
      .update({ status })
      .eq('id', id);

    if (error) { showToast('更新に失敗しました', '#e02424'); return; }

    showToast(status === 'approved' ? '承認しました' : '却下しました',
              status === 'approved' ? '#10b981' : '#ef4444');
    loadApplications();
  }

  // ── ヘルパー ──
  function badgeHtml(status) {
    const map = {
      pending:  ['badge-pending',  '審査中'],
      approved: ['badge-approved', '承認済み'],
      rejected: ['badge-rejected', '却下済み']
    };
    const [cls, label] = map[status] || ['badge-pending', status];
    return `<span class="badge ${cls}">${label}</span>`;
  }

  function actionHtml(a) {
    if (a.status !== 'pending') return '<span style="color:#ccc;font-size:0.8rem">―</span>';
    return `<div class="action-btns">
      <button class="btn-approve" onclick="updateStatus(${a.id},'approved')">承認</button>
      <button class="btn-reject"  onclick="updateStatus(${a.id},'rejected')">却下</button>
    </div>`;
  }

  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('ja-JP', { year:'numeric', month:'2-digit', day:'2-digit' })
         + ' ' + d.toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit' });
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function truncate(str, len) {
    return str.length > len ? str.slice(0, len) + '…' : str;
  }

  let toastTimer;
  function showToast(msg, bg = '#1a56db') {
    clearTimeout(toastTimer);
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = bg;
    t.classList.add('show');
    toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
  }
</script>
</body>
</html>
